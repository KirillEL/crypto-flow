version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8080
      - GIN_MODE=release
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_NAME=${TELEGRAM_BOT_NAME}
      - TELEGRAM_APP_NAME=${TELEGRAM_APP_NAME:-app}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
    ports:
      - "8080:8080"
    volumes:
      - alerts_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_WS_URL=${VITE_WS_URL:-wss://stream.binance.com:9443/stream}
        - VITE_TELEGRAM_BOT_NAME=${TELEGRAM_BOT_NAME}
        - VITE_TELEGRAM_APP_NAME=${TELEGRAM_APP_NAME:-app}
    restart: unless-stopped
    ports:
      - "2222:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  alerts_data:
