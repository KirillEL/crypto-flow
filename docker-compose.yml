version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8080
      - GIN_MODE=release
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_WS_URL=${VITE_WS_URL:-wss://stream.binance.com:9443/stream}
    restart: unless-stopped
    ports:
      - "2222:80"
    depends_on:
      backend:
        condition: service_healthy
